name: Unpublish npm version

on:
  workflow_dispatch:
    inputs:
      version:
        description: npm version to unpublish
        required: true

jobs:
  unpublish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Unpublish version
        run: npm unpublish koishi-plugin-esp32-to-galaku@${{ inputs.version }} --force
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
